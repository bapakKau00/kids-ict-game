<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect Komputer - Tangkap Komponen!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/music.js"></script>
</head>

<body class="page-protect" style="margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh;">
    <!-- Keep the background overlay for the right panel/header -->
    <div class="background-overlay"></div>
    
    <a href="index.html" class="nav-btn btn-c2" style="position: fixed; top: 20px; left: 20px; padding: 10px 20px; font-size: 1.2rem; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">⬅ Kembali ke Menu</a>
    <a href="index.html" class="nav-btn btn-c3" style="position: fixed; top: 20px; right: 20px; padding: 10px 20px; font-size: 1.2rem; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">✖️ Berhenti</a>


    <header class="hero text-center"
        style="padding-top: 5px; padding-bottom: 10px; position: relative; z-index: 60; flex-shrink: 0;">
        <h1 class="bounce-title" style="color: white; text-shadow: 2px 2px 0 #000; margin: 0; font-size: 2.2rem;">
            Protect Komputer! 🛡️</h1>
        <p class="subtitle"
            style="color: white; font-size: 1.1rem; text-shadow: 1px 1px 0 #000; margin-top: 5px; margin-bottom: 0;">
            Gerakkan bakul! Tangkap komponen komputer, elak barang salah!</p>
    </header>

    <div style="display: flex; flex-grow: 1; width: 100%; height: calc(100vh - 100px); z-index: 10; padding: 0 20px 20px 20px; box-sizing: border-box; gap: 20px; padding-bottom: 40px;">

        <!-- Left Side: Falling Area -->
        <main id="game-area"
            style="position: relative; width: 50%; height: 100%; background-color: #FFFDD0; overflow: hidden; border: 5px solid #FF6B6B; border-radius: 20px; box-sizing: border-box; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);">
            <!-- Player Basket -->
            <div id="basket"
                style="position: absolute; bottom: 15px; left: 50%; width: 120px; height: 80px; transform: translateX(-50%); background: #4ECDC4; border-radius: 10px 10px 30px 30px; border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; z-index: 50;">
                <i class="bi bi-box-seam" style="font-size: 3rem; color: white;"></i>
            </div>
        </main>

        <!-- Right Side: Stats Panel -->
        <aside
            style="width: 50%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 25px 20px; background: rgba(255,255,255,0.15); border-radius: 20px; box-sizing: border-box;">
            
            <!-- LIves tracker -->
            <div
                style="background: rgba(0,0,0,0.7); width: 100%; color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 3px solid #FF6B6B; box-shadow: 0 0 15px rgba(255,107,107,0.5);">
                <h2 style="font-size: 1.5rem; margin-bottom: 0; color: #FF6B6B; margin-top: 0;">Nyawa: <span style="font-size: 1.8rem;" id="lives-display">❤️❤️❤️</span></h2>
            </div>
            
            <div
                style="background: rgba(0,0,0,0.7); width: 100%; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 3px solid #FFE66D; box-shadow: 0 0 15px rgba(255,230,109,0.5);">
                <h2 style="font-size: 1.5rem; margin-bottom: 5px; color: #FFE66D; margin-top: 0;">Masa:</h2>
                <div style="font-size: 3.5rem; font-weight: bold; text-shadow: 2px 2px 0 #000;" id="timer">30</div>
            </div>

            <div
                style="background: rgba(0,0,0,0.7); width: 100%; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 30px; border: 3px solid #4ECDC4; box-shadow: 0 0 15px rgba(78,205,196,0.5);">
                <h2 style="font-size: 1.5rem; margin-bottom: 5px; color: #4ECDC4; margin-top: 0;">Markah:</h2>
                <div style="font-size: 3.5rem; font-weight: bold; text-shadow: 2px 2px 0 #000;" id="score">0</div>
            </div>

        </aside>
    </div>

    <!-- Modal for Game Over -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content glass" style="text-align: center;">
            <h2 id="modal-title" style="font-size: 3rem;">Masa Tamat! ⏰</h2>
            <p id="modal-desc" style="font-size: 1.5rem; margin: 20px 0;">
                Markah akhir anda: <span id="final-score"
                    style="color: #FF6B6B; font-weight: bold; font-size: 3rem; display: block; margin-top: 10px;">0</span>
            </p>
            <div style="display: flex; justify-content: center; gap: 40px; margin-top: 20px; flex-wrap: wrap;">
                <button class="action-btn" onclick="location.reload()" style="font-size: 1.5rem; margin: 0;">Main Lagi 🔄</button>
                <a href="index.html" class="action-btn btn-c2"
                    style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.5rem; margin: 0;">Menu Utama</a>
            </div>
        </div>
    </div>

    <!-- Start Countdown Overlay -->
    <div id="start-countdown-overlay" class="modal">
        <div class="modal-content glass" style="background: transparent; border: none; box-shadow: none; text-align: center;">
            <h2 style="font-size: 4rem; margin-bottom: 20px; color: #FFE66D; text-shadow: 3px 3px 0 #000;">Sedia...</h2>
            <div id="start-countdown-number" style="font-size: 12rem; font-weight: bold; text-shadow: 5px 5px 0 #000; color: #4ECDC4; transition: transform 0.2s;">3</div>
        </div>
    </div>

    <script src="js/protect.js"></script>
</body>

</html>
